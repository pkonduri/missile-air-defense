<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS — Air Defense Command</title>
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <span class="logo">◆ AEGIS</span>
                <span class="subtitle">AIR DEFENSE COMMAND SYSTEM</span>
            </div>
            <div class="top-bar-center">
                <span class="status-indicator active"></span>
                <span class="system-status">SYSTEM ACTIVE</span>
                <span class="separator">|</span>
                <span id="clock" class="clock">00:00:00 UTC</span>
            </div>
            <div class="top-bar-right">
                <span class="threat-level" id="threatLevel">THREAT LEVEL: <strong>LOW</strong></span>
                <button class="sound-toggle" id="soundToggle" title="Toggle sound effects">🔊</button>
                <button class="theme-toggle" id="themeToggle" title="Toggle day/night mode">🌙</button>
            </div>
        </header>

        <!-- Main Grid -->
        <main class="dashboard">
            <!-- Left Panel: Defense Systems -->
            <section class="panel defense-panel">
                <div class="panel-header">
                    <span class="panel-icon">⛨</span>
                    <h2>DEFENSE SYSTEMS</h2>
                    <button class="btn-add" id="btnAddDefense" title="Add custom defense system">+</button>
                    <span class="panel-status online">ONLINE</span>
                </div>
                <div class="panel-body" id="defenseSystems"></div>
            </section>

            <!-- Center: World Map -->
            <section class="panel radar-panel">
                <div class="panel-header">
                    <span class="panel-icon">◎</span>
                    <h2>GLOBAL THREAT MAP</h2>
                    <span class="panel-status online">ACTIVE</span>
                </div>
                <div class="radar-container">
                    <canvas id="radarCanvas"></canvas>
                    <div class="radar-overlay">
                        <span id="trackedCount" class="tracked-count">0 TRACKED</span>
                    </div>
                    <div class="stats-hud" id="statsHud"></div>
                    <div class="speed-control" id="speedControl">
                        <button class="speed-btn" data-speed="0" title="Pause (P)">⏸</button>
                        <button class="speed-btn active" data-speed="1" title="1x Speed (1)">1×</button>
                        <button class="speed-btn" data-speed="2" title="2x Speed (2)">2×</button>
                        <button class="speed-btn" data-speed="4" title="4x Speed (4)">4×</button>
                    </div>
                </div>
                <div class="scenario-bar" id="scenarioBar"></div>
                <div class="radar-controls">
                    <button class="btn" id="btnLaunchThreat">LAUNCH THREAT</button>
                    <button class="btn btn-scenario" id="btnScenarios">SCENARIOS</button>
                    <button class="btn btn-danger" id="btnEngageAll">ENGAGE ALL</button>
                    <button class="btn btn-secondary" id="btnReset">RESET</button>
                </div>
            </section>

            <!-- Right Panel: Missile Catalog -->
            <section class="panel missile-panel">
                <div class="panel-header">
                    <span class="panel-icon">▲</span>
                    <h2>THREAT CATALOG</h2>
                    <button class="btn-add" id="btnAddThreat" title="Add custom threat">+</button>
                    <span class="panel-status online">LOADED</span>
                </div>
                <div class="panel-body" id="missileCatalog"></div>
            </section>

            <!-- Bottom Panel: Event Log -->
            <section class="panel log-panel">
                <div class="panel-header">
                    <span class="panel-icon">▤</span>
                    <h2>ENGAGEMENT LOG</h2>
                </div>
                <div class="log-body" id="eventLog">
                    <div class="log-entry system">System initialized. All defense batteries nominal.</div>
                </div>
            </section>

            <!-- Bottom Right: Active Engagements -->
            <section class="panel engagements-panel">
                <div class="panel-header">
                    <span class="panel-icon">⚡</span>
                    <h2>ACTIVE ENGAGEMENTS</h2>
                </div>
                <div class="panel-body" id="activeEngagements">
                    <div class="no-engagements">NO ACTIVE ENGAGEMENTS</div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
